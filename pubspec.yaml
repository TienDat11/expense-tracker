name: expense_tracker
description: AI-powered expense tracking app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Supabase
  supabase_flutter: ^2.0.0

  # UI
  fl_chart: ^0.66.0
  intl: ^0.18.1
  google_fonts: ^6.1.0

  # HTTP & Storage
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # Utils
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
